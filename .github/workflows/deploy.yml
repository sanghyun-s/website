name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          # Copy everything except git/workflow files
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
          # If there's no index.html, promote sanghyun_s_website.html to index.html
          if [ ! -f _site/index.html ] && [ -f _site/sanghyun_s_website.html ]; then
            cp _site/sanghyun_s_website.html _site/index.html
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
